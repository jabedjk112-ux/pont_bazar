name: Flutter Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        # এখানে working-directory হিসেবে আপনার ফোল্ডারের নাম দিতে হবে
        run: flutter pub get
        working-directory: ./ # যদি কোডগুলো সরাসরি মেইন ডিরেক্টরিতে থাকে

      - name: Build APK
        # এখানেও working-directory যোগ করতে হবে
        run: flutter build apk --debug
        working-directory: ./

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pont-bazar-apk
          # পাথে আপনার ফোল্ডারের নামসহ লোকেশন দিতে হবে
          path: build/app/outputs/flutter-apk/app-debug.apk
